spring:
  application:
    name: europay-account
  datasource:
    url: jdbc:postgresql://localhost:5433/europay_db
    username: europay
    password: europay_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8082

jwt:
  secret: ${JWT_SECRET:change-me-in-production-256-bits-minimum-secret-key}
