server:
  port: 8081

spring:
  application:
    name: europay-auth
  datasource:
    url: jdbc:postgresql://localhost:5433/europay_db
    username: europay
    password: europay_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:change-me-in-production-256-bits-minimum-secret-key}
  expiration: 86400000
