<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 32" width="48" height="32">
  <defs>
    <mask id="left-mask">
      <rect width="48" height="32" fill="white"/>
      <circle cx="27" cy="16" r="13" fill="black"/>
    </mask>
    <clipPath id="intersect-clip">
      <circle cx="21" cy="16" r="13"/>
    </clipPath>
  </defs>
  <!-- Left circle (blue, excluding intersection) -->
  <circle cx="21" cy="16" r="13" fill="#1B3A6B" mask="url(#left-mask)"/>
  <!-- Right circle (teal) -->
  <circle cx="27" cy="16" r="13" fill="#0DAF87"/>
  <!-- Intersection (darker blend) -->
  <circle cx="27" cy="16" r="13" fill="#0d6e6e" clip-path="url(#intersect-clip)"/>
</svg>
